<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sweetytory Payment</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #fffcf0 0%, #fdf6d0 100%); min-height: 100vh; color: #755B3C; }
    @keyframes float-up-down { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
    @keyframes float-left-right { 0%, 100% { transform: translateX(0px) rotate(0deg); } 50% { transform: translateX(15px) rotate(-10deg); } }
    @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
    @keyframes spin-slow { 100% { transform: rotate(360deg); } }
    @keyframes dash-animation { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -24; } }
    .animate-dash { animation: dash-animation 1s linear infinite; }
    .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
    .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
    .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
    .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
    .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
    .anim-spin { animation: spin-slow 8s linear infinite; }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 20px 50px -10px rgba(181, 191, 90, 0.2); }
    .virtual-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .virtual-card:hover { transform: translateY(-4px); }
    .contact-btn { display: flex; align-items: center; justify-content: center; background: white; padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; }
    ::-webkit-scrollbar { width: 0px; }
</style>
<script>
    tailwind.config = { theme: { extend: { colors: { primary: { 500: '#B5BF5A', 600: '#FFD542' } } } } }
</script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-[#755B3C] relative overflow-x-hidden">

<!-- Background Decorative SVGs -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
    <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-[#B5BF5A]/30 anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
    <!-- (คงค่าเดิมไว้ทั้งหมด) -->
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-[#755B3C]/95 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm border border-[#B5BF5A]">
    คัดลอกเรียบร้อย
</div>

<!-- Main Container -->
<div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
    <!-- Header -->
    <div class="text-center pt-2 pb-2 relative">
        <h1 class="text-2xl font-bold tracking-tight text-[#755B3C] flex items-center justify-center gap-2">
            Sweety.tory
        </h1>
        <p class="text-sm font-medium text-[#755B3C]/70 mt-1">Payment & Checkout</p>
    </div>

    <!-- Glass Card -->
    <div class="glass-card rounded-[40px] p-3 relative z-10">
        <div class="relative p-2 rounded-[36px] z-10">
            <svg class="absolute inset-0 w-full h-full pointer-events-none">
                <rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#B5BF5A" stroke-width="2.5" stroke-dasharray="12 12" stroke-linecap="round" class="animate-dash" />
            </svg>
            <div class="rounded-[28px] overflow-hidden relative shadow-sm border-[4px] border-white">
                <img src="ไม่มีชื่อ 7148_20260629124348.png" alt="บัญชี sweetytory" class="w-full h-auto object-cover" onerror="this.src='https://placehold.co/600x600/fffcf0/B5BF5A?text=sweety+tory+Payment'">
            </div>
        </div>

        <div class="p-4 pt-6 space-y-5">
            <!-- Payment Info -->
            <div class="text-center space-y-3">
                <p class="text-[15px] font-medium text-[#755B3C]">เลขบัญชีตามนี้เลยนะคะ<br>ชื่อบัญชี <span class="text-[#B5BF5A] font-bold bg-[#B5BF5A]/20 px-2 py-0.5 rounded-lg">ธันยพัต</span> เท่านั้น!!</p>
            </div>

            <!-- Virtual Cards -->
            <div class="space-y-4">
                <div class="virtual-card bg-gradient-to-br from-[#B5BF5A] to-[#FFD542] rounded-[24px] p-5 shadow-lg cursor-pointer" onclick="copyText('216869758', this, 'kbank')">
                    <div class="flex justify-between items-center text-white font-bold text-sm"><span>KBank</span><button class="kbank-btn bg-white text-[#755B3C] px-4 py-2 rounded-full text-[12px]">คัดลอก</button></div>
                    <div class="mt-2 text-white font-bold text-[22px] tracking-widest">216869758</div>
                </div>
                <div class="virtual-card bg-gradient-to-br from-[#FFD542] to-[#B5BF5A] rounded-[24px] p-5 shadow-lg cursor-pointer" onclick="copyText('0615857090', this, 'true')">
                    <div class="flex justify-between items-center text-white font-bold text-sm"><span>TrueMoney</span><button class="true-btn bg-white text-[#755B3C] px-4 py-2 rounded-full text-[12px]">คัดลอก</button></div>
                    <div class="mt-2 text-white font-bold text-[22px] tracking-widest">0615857090</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Contact Section -->
    <div class="mt-8 text-center pt-6 border-t border-white/60">
        <h3 class="font-bold text-[#8c5a65] mb-4 tracking-widest text-sm uppercase">ช่องทางการติดต่อ💭</h3>
        <div class="flex justify-center gap-4">
            <a href="https://www.facebook.com/profile.php?id=61554192600355" class="contact-btn">Facebook</a>
            <a href="https://lin.ee/t0qYbAl" class="contact-btn">Line</a>
        </div>
    </div>

    <!-- Footer -->
    <div class="text-center text-[11px] text-[#755B3C]/60 pt-4 space-y-1">
        <p>ปกติเค้าจะตอบกลับไม่เกิน 5 นาทีนะคะ ( หากตอบช้าเค้าติดธุระนะคะ )</p>
        <p>© 2026 Sweety.tory - ขอบคุณที่มาใช้บริการนะคะ ♡</p>
    </div>
</div>

<script>
    function copyText(text, containerElement, type) {
        navigator.clipboard.writeText(text);
        showToast();
        const btn = containerElement.querySelector(type === 'kbank' ? '.kbank-btn' : '.true-btn');
        btn.innerText = 'สำเร็จ';
        setTimeout(() => btn.innerText = 'คัดลอก', 2000);
    }
    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.remove('opacity-0', 'translate-y-4');
        toast.classList.add('opacity-100', 'translate-y-0');
        setTimeout(() => { toast.classList.remove('opacity-100', 'translate-y-0'); toast.classList.add('opacity-0', 'translate-y-4'); }, 2500);
    }
</script>
</body>
</html>
